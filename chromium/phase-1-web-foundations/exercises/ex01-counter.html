<h1>Exercise 1: Custom Element — Click Counter</h1>

<div class="hint">
  <strong>Yêu cầu:</strong> Implement <code>&lt;click-counter&gt;</code> element bên dưới.<br>
  - Hiển thị số đếm bắt đầu từ <code>start</code> attribute (mặc định 0)<br>
  - Có nút "+" và "−"<br>
  - Khi số thay đổi, dispatch event <code>count-changed</code> với <code>detail.count</code><br>
  - Khi count = 0, nút "−" bị disable
</div>

<!-- Test usage -->
<click-counter start="5"></click-counter>
<click-counter></click-counter>

<div class="test-output" id="log">Events sẽ hiện ở đây...</div>

<script>

      // TODO

    connectedCallback() {
      // TODO: render UI và add event listeners
    }

    attributeChangedCallback(name, oldValue, newValue) {
      // TODO
    }
  }

  customElements.define('click-counter', ClickCounter);

  // ============================================================

  const log = document.getElementById('log');

  document.querySelectorAll('click-counter').forEach((el, i) => {
    el.addEventListener('count-changed', (e) => {
      log.innerHTML += `<div>Counter ${i + 1}: count-changed → ${e.detail.count}</div>`;
    });

</script>
